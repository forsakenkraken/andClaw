name: Build andClaw Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source at tag v2.2.62
        uses: actions/checkout@v4
        with:
          ref: 'v2.2.62'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up QEMU for arm64 Docker builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Create missing Dockerfile.openclaw-builder
        run: |
          cat > scripts/Dockerfile.openclaw-builder <<'EOF'
          # Reconstructed from setup-assets.sh requirements
          # - Needs Node.js v24.2.0 (matched to script's NODEJS_VERSION)
          # - Needs python3 at /usr/bin/python3 (for node-gyp)
          # - Needs /usr/local/lib/node_modules as global root (Node tarball default)
          # - Needs node:sqlite (built into Node 22+)
          ARG NODEJS_VERSION=v24.2.0
          FROM ubuntu:24.04

          ARG NODEJS_VERSION
          ENV DEBIAN_FRONTEND=noninteractive

          RUN apt-get update -qq && \
              apt-get install -y -qq --no-install-recommends \
                  ca-certificates curl wget \
                  python3 python3-dev \
                  make g++ \
                  git \
                  xz-utils ca-certificates && \
              rm -rf /var/lib/apt/lists/* && \
              ln -sf /usr/bin/python3 /usr/bin/python

          # Install Node.js from official arm64 tarball (matches script's NODEJS_URL)
          RUN curl -fsSL "https://nodejs.org/dist/${NODEJS_VERSION}/node-${NODEJS_VERSION}-linux-arm64.tar.xz" \
                  -o /tmp/node.tar.xz && \
              tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1 && \
              rm /tmp/node.tar.xz && \
              node --version && npm --version

          # Configure npm to use python3 for any native modules
          RUN npm config set python /usr/bin/python3

          WORKDIR /workspace
          EOF
          echo "Created Dockerfile.openclaw-builder:"
          cat scripts/Dockerfile.openclaw-builder

      - name: Generate bundled assets (rootfs, node, chromium, openclaw) via Docker
        run: |
          chmod +x scripts/setup-assets.sh
          ./scripts/setup-assets.sh

      - name: Build prodDebug APK
        run: ./gradlew assembleProdDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: andclaw-v2.2.62-debug-apk
          path: app/build/outputs/apk/prod/debug/*.apk
          retention-days: 30
